
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23CDB7FF'/%3E%3Cstop offset='100%25' stop-color='%23B6A1FF'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='50' fill='url(%23g)'/%3E%3Cpath d='M35,25 Q50,15 65,25 L65,75 Q50,85 35,75 Z' fill='none' stroke='%23A7D9FF' stroke-width='3'/%3E%3Ctext x='50' y='60' font-family='sans-serif' font-size='35' fill='%23FFFFFF' text-anchor='middle' font-weight='bold'%3EAI%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rewrite Tomorrow Film Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #020617; /* slate-950 */
        overflow: hidden;
        color: #e2e8f0;
      }
      
      /* Noise Texture Overlay */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      #root {
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        position: relative;
        z-index: 1;
      }

      /* Custom Scrollbar */
      #root::-webkit-scrollbar { width: 6px; }
      #root::-webkit-scrollbar-track { background: transparent; }
      #root::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.3);
        border-radius: 10px;
      }
      #root::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.6); }
      
      .btn-glow {
        position: relative;
        background-size: 200% auto;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      }
      .btn-glow:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4), 0 8px 10px -6px rgba(139, 92, 246, 0.2);
      }
      .btn-glow:active { transform: translateY(0); }
      .btn-glow:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

      .btn-glass {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(8px);
        transition: all 0.2s ease;
      }
      .btn-glass:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .panel-glass {
        background: rgba(15, 23, 42, 0.6); /* slate-900/60 */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      }
      
      .panel-glass-strong {
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .text-shadow-sm { text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
      .text-shadow-glow { text-shadow: 0 0 20px rgba(167, 139, 250, 0.5); }

    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Courier Prime', 'monospace'],
            },
            colors: {
              violet: { DEFAULT: '#8B5CF6', 300: '#C4B5FD', 400: '#A78BFA', 500: '#8B5CF6', 900: '#4C1D95' },
              cyan: { DEFAULT: '#06B6D4', 300: '#67E8F9', 400: '#22D3EE', 500: '#06B6D4', 900: '#164E63' },
              slate: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' },
              gold: '#FCD34D',
            },
            backgroundImage: {
              'primary-action-gradient': 'linear-gradient(135deg, #7C3AED 0%, #3B82F6 100%)',
              'card-gradient': 'linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%)',
              'text-gradient-violet': 'linear-gradient(to right, #C4B5FD, #A78BFA)',
              'aurora-gradient': 'radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%)',
            },
            animation: {
              'aurora': 'aurora 60s linear infinite',
              'fade-in': 'fadeIn 0.6s ease-out forwards',
              'fade-in-stagger': 'fadeInStagger 0.6s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              aurora: {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInStagger: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              }
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.25.0",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "jspdf": "https://aistudiocdn.com/jspdf@^2.5.2/dist/jspdf.es.min.js"
      }
    }
    </script>
</head>
  <body>
    <div class="bg-noise"></div>
    <div class="fixed top-0 left-0 -z-10 h-full w-full bg-slate-950">
      <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-violet-900/20 blur-[120px] animate-pulse-slow"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[60%] rounded-full bg-cyan-900/20 blur-[100px] animate-pulse-slow" style="animation-delay: 2s"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
