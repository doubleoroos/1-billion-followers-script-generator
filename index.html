    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rewrite Tomorrow Film Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #020617; /* slate-950 */
        overflow: hidden;
      }
      #root {
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #root::-webkit-scrollbar { width: 8px; }
      #root::-webkit-scrollbar-track { background: transparent; }
      #root::-webkit-scrollbar-thumb {
        background: rgba(192, 132, 252, 0.3);
        border-radius: 4px;
        border: 1px solid rgba(255,255,255,0.1);
      }
      #root::-webkit-scrollbar-thumb:hover { background: rgba(192, 132, 252, 0.5); }
      
      .btn-glow {
        position: relative;
        transition: transform 0.2s ease-out, box-shadow 0.2s ease-out, background-position 0.5s ease-out;
        background-size: 200% auto;
      }
      .btn-glow::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
        z-index: 1;
        transition: opacity 0.2s ease-out;
      }
      .btn-glow:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px 4px rgba(192, 132, 252, 0.4), 0 0 10px 0 rgba(255,255,255,0.1) inset;
        background-position: right center;
      }
      .btn-glow:hover::before { opacity: 0.5; }
      .btn-glow:active, .btn-glow.active {
        transform: translateY(1px);
        box-shadow: 0 0 15px 2px rgba(192, 132, 252, 0.3), 0 0 5px 0 rgba(255,255,255,0.1) inset;
      }
      .btn-glow.disabled, .btn-glow:disabled {
        transform: translateY(0);
        box-shadow: none;
        background-image: none;
        background-color: #4b5563; /* gray-600 */
        cursor: not-allowed;
      }
      .btn-glass {
        position: relative;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: background-color 0.2s ease-out, border-color 0.2s ease-out;
      }
      .btn-glass:hover {
        background-color: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .btn-glass:active, .btn-glass.active {
        background-color: rgba(192, 132, 252, 0.15); /* violet-400/15 */
        border-color: rgba(192, 132, 252, 0.8);
      }

      .panel-glass {
        position: relative;
        background: rgba(30, 41, 59, 0.6); /* slate-800/60 */
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .panel-glass::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Courier Prime', 'monospace'],
            },
            colors: {
              'azure': '#2A7DD4',
              'cyan': '#A7D9FF',
              'gold': '#F5E6B0',
              'violet': {
                'DEFAULT': '#B39BFF',
                '300': '#CDB7FF',
                '400': '#B39BFF',
                '500': '#A374FF',
                '600': '#9353FF',
              },
              'slate': {
                '800': '#1e293b',
                '900': '#0f172a',
                '950': '#020617',
              },
              'fuchsia': {
                '500': '#d946ef',
                '600': '#c026d3',
              },
              'indigo': {
                '500': '#6366f1',
                '600': '#4f46e5',
              },
              'text-primary': 'rgba(255, 255, 255, 0.95)',
              'text-secondary': 'rgba(167, 217, 255, 0.75)',
            },
            backgroundImage: {
              'text-gradient-gold': 'linear-gradient(135deg, #F5E6B0, #D4AF37)',
              'text-gradient-violet': 'linear-gradient(135deg, #CDB7FF, #A374FF)',
              'text-gradient-cyan': 'linear-gradient(135deg, #A7D9FF, #2A7DD4)',
              'aurora-gradient': 'radial-gradient(at 27% 37%, hsla(215, 98%, 61%, 0.2) 0px, transparent 50%), radial-gradient(at 97% 21%, hsla(125, 98%, 72%, 0.2) 0px, transparent 50%), radial-gradient(at 82% 23%, hsla(340, 98%, 71%, 0.2) 0px, transparent 50%), radial-gradient(at 27% 91%, hsla(140, 98%, 61%, 0.15) 0px, transparent 50%), radial-gradient(at 95% 98%, hsla(343, 98%, 73%, 0.2) 0px, transparent 50%), radial-gradient(at 32% 46%, hsla(303, 98%, 70%, 0.15) 0px, transparent 50%)',
              'primary-action-gradient': 'linear-gradient(120deg, #c026d3, #7c3aed, #4f46e5)',
              'glass-edge': 'linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%)',
            },
            boxShadow: {
              'soft': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
              'glow-violet': '0 0 25px 4px rgba(192, 132, 252, 0.4)',
              'inner-soft': 'inset 0 2px 8px 0 rgba(0, 0, 0, 0.4)',
            },
            keyframes: {
              'aurora': {
                'from': { backgroundPosition: '0% 50%' },
                'to': { backgroundPosition: '300% 50%' },
              },
              'subtle-fade-in': {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              'fade-in-stagger': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'draw-checkmark': {
                '0%': { strokeDashoffset: 24 },
                '100%': { strokeDashoffset: 0 },
              },
              'progress-indeterminate': {
                '0%': { transform: 'translateX(-100%) scaleX(0.5)' },
                '50%': { transform: 'translateX(0) scaleX(1)' },
                '100%': { transform: 'translateX(100%) scaleX(0.5)' },
              },
              'pulse-orb': {
                '0%, 100%': { transform: 'scale(0.8)', opacity: '0.7' },
                '50%': { transform: 'scale(1)', opacity: '1' },
              }
            },
            animation: {
              'aurora': 'aurora 60s linear infinite',
              'fade-in': 'subtle-fade-in 0.8s ease-out forwards',
              'fade-in-stagger': 'fade-in-stagger 0.8s ease-out forwards',
              'draw-checkmark': 'draw-checkmark 0.3s ease-out forwards',
              'progress-indeterminate': 'progress-indeterminate 2.5s ease-in-out infinite',
              'pulse-orb': 'pulse-orb 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
