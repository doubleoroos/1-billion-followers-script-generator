<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Billion Followers Script Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Courier Prime', 'monospace'],
            },
            colors: {
              'blue-deep': '#1B2230',
              'blue-darker': '#0D1117',
              'violet-glow': '#B6A1FF',
              'lilac-glow': '#CDB7FF',
              'rose-gray': '#E9ECF2',
              'cyan-lum': '#9EE9F7',
              'brand-amber': '#fbbf24',
            },
            keyframes: {
              'subtle-fade-in': {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              'glow': {
                '0%, 100%': { boxShadow: '0 0 10px rgba(251, 191, 36, 0.2), 0 0 20px rgba(251, 191, 36, 0.1)' },
                '50%': { boxShadow: '0 0 20px rgba(251, 191, 36, 0.4), 0 0 30px rgba(251, 191, 36, 0.2)' },
              },
              'draw-checkmark': {
                '0%': { strokeDashoffset: 24 },
                '100%': { strokeDashoffset: 0 },
              },
              'progress-indeterminate': {
                '0%': { transform: 'translateX(-100%) scaleX(0.5)' },
                '50%': { transform: 'translateX(0) scaleX(1)' },
                '100%': { transform: 'translateX(100%) scaleX(0.5)' },
              }
            },
            animation: {
              'fade-in': 'subtle-fade-in 0.8s ease-out forwards',
              'glow': 'glow 3s ease-in-out infinite',
              'draw-checkmark': 'draw-checkmark 0.3s ease-out forwards',
              'progress-indeterminate': 'progress-indeterminate 2.5s ease-in-out infinite',
            }
          }
        }
      }
    </script>
